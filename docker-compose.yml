version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quizify-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quizify}
      POSTGRES_USER: ${POSTGRES_USER:-quizify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file (copy .env.example first)}
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U quizify']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
