# Render Blueprint — deploys Postgres + backend API + Next.js frontend.
# In the Render dashboard: New → Blueprint → point at this repo.
# After the first deploy, set the three `sync: false` URL vars (see below).

databases:
  - name: quizify-db
    databaseName: quizify
    user: quizify
    plan: free

services:
  # ─── Backend: Hono API + Socket.io (persistent Node process) ───────────
  - type: web
    name: quizify-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm run start:server
    healthCheckPath: /api/health
    envVars:
      - key: NPM_CONFIG_PRODUCTION
        value: 'false' # ensure devDeps (tsx, prisma) are installed
      - key: NODE_VERSION
        value: '20'
      - key: DATABASE_URL
        fromDatabase:
          name: quizify-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      # Your deployed frontend URL, e.g. https://quizify-web.onrender.com
      - key: FRONTEND_URL
        sync: false

  # ─── Frontend: Next.js ─────────────────────────────────────────────────
  - type: web
    name: quizify-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NPM_CONFIG_PRODUCTION
        value: 'false' # ensure devDeps (tailwind, typescript) are installed
      - key: NODE_VERSION
        value: '20'
      # Your deployed API URL, e.g. https://quizify-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
